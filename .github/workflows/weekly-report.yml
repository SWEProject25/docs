name: Weekly Progress Report

on:
  schedule:
    # Runs every Friday at 00:00 (midnight)
    - cron: '0 0 * * 5'
  workflow_dispatch: # Allows manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm init -y
          npm install @octokit/rest date-fns
      
      - name: Generate Weekly Report
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ORG_NAME: ${{ github.repository_owner }}
        run: node .github/scripts/generate-report.js
      
      - name: Commit and Push Report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Weekly Report - Week $(date +%V) $(date +%Y)" && git push)