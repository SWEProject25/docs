name: Generate Weekly Progress Report

on:
  workflow_dispatch:
    inputs:
      week_number:
        description: 'Week number (e.g., Week-2)'
        required: false
        default: 'auto'
  schedule:
    - cron: '0 18 * * 6'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      projects: read
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install requests PyGithub python-dateutil
          
      - name: Generate Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          WEEK_NUMBER: ${{ github.event.inputs.week_number }}
        run: |
          python .github/scripts/generate_weekly_report.py
          
      - name: Commit and Push Report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Weekly Progress Report - $(date +'%Y-%m-%d')" && git push)